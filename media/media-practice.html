<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Embedding Practice</title>
</head>
<body>
    <h1>Media Embedding Practice</h1>

    <h2>1. YouTube Video Embed</h2>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/YE7VzlLtp-4" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>

    <h2>2. HTML5 Video Player</h2>
    <video id="video" width="400" height="300" controls autoplay>
        <source src="mov_bbb.webm" type="video/webm">
        <source src="mov_bbb.mp4" type="video/mp4">
        <p>Your browser does not support the video element. <a href="mov_bbb.mp4">Download the video instead.</a></p>
    </video>

    <h2>3. HTML5 Audio Player</h2>
    <audio id="audio" controls>
        <source src="horse.mp3" type="audio/mp3">
        <p>Your browser does not support the audio element. Download the audio file: <a href="horse.mp3">horse.mp3</a></p>
    </audio>
</body>
</html>
